<!DOCTYPE html>
<html>
<body>
<h1>Testing...</h1>
<pre id="result"></pre>

<script>
fetch('https://metaphysics-cdn.artsy.net/v2', {
  method: 'POST',
  credentials: 'include',
  headers: {'Content-Type': 'application/json'},
  body: JSON.stringify({query: 'query { me { id email } }'})
})
.then(r => r.json())
.then(data => {
  document.getElementById('result').textContent = JSON.stringify(data, null, 2);
})
.catch(e => {
  document.getElementById('result').textContent = 'Error: ' + e;
});
</script>
</body>
</html>
